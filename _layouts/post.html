{{ content }}

<hr>
<p style="text-align: center;">
  <a href="{{ '/' | relative_url }}" class="btn" style="color: #159957; border: 1px solid #159957; padding: 10px 20px;">🏠 ホームに戻る</a>
</p>

{% if page.mermaid %}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  
  // 初期化（重要：querySelectorでmermaid用クラスを探す設定）
  mermaid.initialize({ startOnLoad: true, theme: 'default' });

  // Jekyllが出力する .language-mermaid クラスを mermaid クラスに変換して再描画
  document.addEventListener('DOMContentLoaded', function() {
    const blocks = document.querySelectorAll('.language-mermaid');
    blocks.forEach(block => {
      const code = block.innerText;
      const newEl = document.createElement('div');
      newEl.className = 'mermaid';
      newEl.innerHTML = code;
      block.parentNode.replaceChild(newEl, block);
    });
    mermaid.run();
  });
</script>
{% endif %}
